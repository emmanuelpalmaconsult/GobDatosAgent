# PostgreSQL Configuration for Investment Analytics
# Optimizado para cargas de trabajo de análisis de datos

# ==============================================
# MEMORY SETTINGS
# ==============================================

# Memoria compartida (aumentar según RAM disponible)
shared_buffers = 256MB                    # ~25% de RAM disponible
effective_cache_size = 1GB                # ~75% de RAM disponible
work_mem = 16MB                          # Para ordenamientos y joins
maintenance_work_mem = 64MB              # Para VACUUM, CREATE INDEX

# ==============================================
# QUERY PLANNER
# ==============================================

# Configuraciones para optimizar consultas analíticas
random_page_cost = 1.1                   # SSD optimized
effective_io_concurrency = 200          # Para SSD
default_statistics_target = 100         # Más estadísticas para mejor planning

# ==============================================
# WAL (Write-Ahead Logging)
# ==============================================

# Configuraciones para mejor rendimiento de escritura
wal_buffers = 16MB
checkpoint_completion_target = 0.7
wal_writer_delay = 200ms
commit_delay = 0

# ==============================================
# CONNECTION SETTINGS  
# ==============================================

max_connections = 100
shared_preload_libraries = 'pg_stat_statements'

# ==============================================
# LOGGING
# ==============================================

# Logging para debugging y monitoring
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000       # Log queries > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'mod'                   # Log modificaciones

# ==============================================
# PERFORMANCE MONITORING
# ==============================================

# Para monitoreo de performance
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# ==============================================
# BACKGROUND WRITER
# ==============================================

# Optimizaciones para escritura en background
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ==============================================
# AUTOVACUUM (muy importante para analytics)
# ==============================================

# Configuraciones para mantener statisticas actualizadas
autovacuum = on
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# ==============================================
# LOCALE/TIMEZONE
# ==============================================

timezone = 'UTC'
datestyle = 'iso, dmy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# ==============================================
# SECURITY
# ==============================================

ssl = off                               # Para desarrollo local
password_encryption = scram-sha-256

# ==============================================
# COMENTARIOS Y NOTAS
# ==============================================

# Esta configuración está optimizada para: 
# - Consultas analíticas complejas
# - Inserciones batch de datos
# - Joins entre múltiples tablas
# - Agregaciones y cálculos estadísticos
# - Ambiente de desarrollo/testing local

# Para producción, ajustar según:
# - Memoria RAM disponible
# - Tipo de almacenamiento (SSD/HDD)
# - Carga de trabajo específica
# - Número de conexiones concurrentes