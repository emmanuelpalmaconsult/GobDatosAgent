version: '3.8'

services:
  analytics-db:
    image: postgres:15
    container_name: investment-analytics
    environment:
      POSTGRES_DB: InvestmentAnalytics
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics_password}
    ports:
      - "5432:5432"
    volumes:
      - analytics_data:/var/lib/postgresql/data
      - ./scripts/init_analytics_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d InvestmentAnalytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - investment-network

  pgadmin:
    profiles:
      - admin
    image: dpage/pgadmin4:latest
    container_name: investment-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@investment.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      analytics-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - investment-network

  redis:
    profiles:
      - cache
    image: redis:7-alpine
    container_name: investment-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - investment-network

networks:
  investment-network:
    driver: bridge

volumes:
  analytics_data:
  pgadmin_data: